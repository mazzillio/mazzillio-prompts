pre-commit:
  commands:
    check:
      run: npm run format {staged_files}
      glob: '**/*.{js,jsx,ts,tsx,json,css,md}'
      stage_fixed: true

pre-push:
  commands:
    validate:
      glob: '*.{ts,tsx}'
      run: npm run typecheck
    lint:
      glob: '*.{ts,tsx}'
      run: npm run lint
    test:
      glob: '*.{ts,tsx}'
      run: npm run test:coverage
